<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Man Up To Cancer – Chapter Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="map.css" />
</head>
<body>
  <div id="map">
    <div id="map-hint">Click to interact</div>
    <div id="map-loading">
      <div class="loading-spinner"></div>
      <span>Loading chapters…</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    // ─── Config ────────────────────────────────────────────────────────────────
    // Replace with your Google Sheet "Publish to web" CSV URL:
    // File → Share → Publish to web → Sheet1 → Comma-separated values (.csv) → Publish
    //
    // Required column headers (row 1):
    //   chapter | leaders | mct_contact | region | lat | lng
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSjXaB419T9ExamQySEJFe8zKfto1XDpAhrZ6tvT-nqNejpgaN1TWoY8cI1peBnWv3K-sjHPFHCJrkQ/pub?gid=1459202765&single=true&output=csv';

    const map = L.map('map', {
      zoomControl: true,
      scrollWheelZoom: false,
      dragging: false
    });

    // ─── Click-to-engage ───────────────────────────────────────────────────────
    // Scroll and drag are disabled by default so the map doesn't hijack page
    // scroll when embedded. They activate on click and deactivate on mouse leave.
    const mapContainer = map.getContainer();

    mapContainer.addEventListener('click', () => {
      map.scrollWheelZoom.enable();
      map.dragging.enable();
      mapContainer.classList.add('engaged');
    });

    mapContainer.addEventListener('mouseleave', () => {
      map.scrollWheelZoom.disable();
      map.dragging.disable();
      mapContainer.classList.remove('engaged');
    });

    // Minimal light basemap (CartoDB Positron)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ─── Custom marker icon ────────────────────────────────────────────────────
    const mutcIcon = L.icon({
      iconUrl: 'MUTC-map-pin.svg',
      iconSize:    [28, 39],
      iconAnchor:  [14, 39],
      popupAnchor: [0, -42]
    });

    // ─── Search control ────────────────────────────────────────────────────────
    const SearchControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd() {
        const container = L.DomUtil.create('div', 'search-control');
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        container.innerHTML = `
          <div class="search-wrap">
            <input type="text" id="search-input" placeholder="Search chapters, leaders…" autocomplete="off" spellcheck="false" />
            <button id="search-clear" title="Clear">&#x00D7;</button>
          </div>
          <div id="search-count"></div>
        `;
        return container;
      }
    });
    new SearchControl().addTo(map);

    // ─── Loading / error state ─────────────────────────────────────────────────
    const loadingEl = document.getElementById('map-loading');

    function showError(msg) {
      loadingEl.querySelector('span').textContent = msg;
      loadingEl.querySelector('.loading-spinner').style.display = 'none';
      loadingEl.classList.add('error');
    }

    // ─── Render chapters (called after data is ready) ──────────────────────────
    function renderChapters(features) {
      loadingEl.classList.add('hidden');

      const clusterGroup = L.markerClusterGroup({ showCoverageOnHover: false });
      const markerData = [];

      L.geoJSON({ type: 'FeatureCollection', features }, {
        pointToLayer: (feature, latlng) => L.marker(latlng, { icon: mutcIcon }),
        onEachFeature: (feature, layer) => {
          const p = feature.properties;
          const meetingRow = p.meeting_frequency
            ? `<div class="popup-label">Meeting Frequency</div><div class="popup-value">${p.meeting_frequency}</div>`
            : '';
          const communityRow = p.online_community_url
            ? `<div class="popup-label">Online Community</div><div class="popup-value"><a href="${p.online_community_url}" target="_blank" rel="noopener noreferrer">${p.online_community_url}</a></div>`
            : '';
          layer.bindPopup(`
            <div class="popup-header">
              <div class="popup-chapter">${p.chapter}</div>
              <div class="popup-region">${p.region}</div>
            </div>
            <div class="popup-body">
              <div class="popup-label">Local Leader(s)</div>
              <div class="popup-value">${p.leaders}</div>
              <div class="popup-label">MUTC Contact</div>
              <div class="popup-value">${p.mutc_contact}</div>
              ${meetingRow}
              ${communityRow}
            </div>
          `, { maxWidth: 260 });
          const searchText = [p.chapter, p.leaders, p.mutc_contact, p.region, p.meeting_frequency]
            .join(' ').toLowerCase();
          markerData.push({ layer, searchText });
        }
      }).addTo(clusterGroup);

      clusterGroup.addTo(map);

      const allLayers = markerData.map(d => d.layer);
      map.fitBounds(L.featureGroup(allLayers).getBounds(), { padding: [24, 24] });

      // ── Search logic ─────────────────────────────────────────────────────────
      const searchInput = document.getElementById('search-input');
      const searchClear = document.getElementById('search-clear');
      const searchCount = document.getElementById('search-count');

      searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase();
        searchClear.style.display = q ? 'flex' : 'none';

        if (!q) {
          markerData.forEach(({ layer }) => {
            if (!clusterGroup.hasLayer(layer)) clusterGroup.addLayer(layer);
          });
          searchCount.textContent = '';
          searchCount.className = '';
          map.fitBounds(L.featureGroup(allLayers).getBounds(), { padding: [24, 24] });
          return;
        }

        const matches = [];
        markerData.forEach(({ layer, searchText }) => {
          if (searchText.includes(q)) {
            if (!clusterGroup.hasLayer(layer)) clusterGroup.addLayer(layer);
            matches.push(layer);
          } else {
            if (clusterGroup.hasLayer(layer)) clusterGroup.removeLayer(layer);
          }
        });

        if (matches.length === 0) {
          searchCount.textContent = 'No results';
          searchCount.className = 'no-results';
        } else {
          searchCount.textContent = `${matches.length} chapter${matches.length !== 1 ? 's' : ''}`;
          searchCount.className = '';
          map.fitBounds(L.featureGroup(matches).getBounds(), { padding: [48, 48], maxZoom: 7 });
        }
      });

      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchInput.dispatchEvent(new Event('input'));
        searchInput.focus();
      });
    }

    // ─── Fetch data from Google Sheet ─────────────────────────────────────────
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete({ data, errors }) {
        if (errors.length) {
          showError('Could not parse chapter data.');
          return;
        }
        const features = data
          .filter(row => row.lat && row.lng && row.chapter)
          .map(row => ({
            type: 'Feature',
            properties: {
              chapter:              row.chapter.trim(),
              leaders:              (row.leaders              || '').trim(),
              mutc_contact:         (row.muct_contact         || '').trim(),
              region:               (row.region               || '').trim(),
              meeting_frequency:    (row.meeting_frequency    || '').trim(),
              online_community_url: (row.online_community_url || '').trim()
            },
            geometry: {
              type: 'Point',
              coordinates: [parseFloat(row.lng), parseFloat(row.lat)]
            }
          }));
        if (!features.length) {
          showError('No chapter data found. Check the sheet format.');
          return;
        }
        renderChapters(features);
      },
      error() {
        showError('Could not load data. Ensure the sheet is published publicly.');
      }
    });
  </script>
</body>
</html>
